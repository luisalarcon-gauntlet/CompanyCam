services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fieldcheck_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails db:create db:migrate db:seed && bundle exec rails server -b 0.0.0.0"
    volumes:
      - ./api:/rails
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - RAILS_ENV=development
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - SECRET_KEY_BASE=fieldcheck_dev_secret_key_base
      - DEVISE_JWT_SECRET_KEY=fieldcheck_jwt_secret
      - CORS_ORIGINS=http://localhost:5173,http://localhost:5174,http://localhost:5175
    env_file:
      - ./api/.env

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "5175:5173"
    depends_on:
      - api
    environment:
      - VITE_API_BASE_URL=http://localhost:3000

volumes:
  postgres_data:
  bundle_cache:
